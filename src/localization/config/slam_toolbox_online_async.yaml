slam_toolbox:
  ros__parameters:

    # ================================================================
    # [1] 최적화 솔버 설정
    #
    # slam_toolbox는 스캔 매칭 결과를 그래프로 쌓고(Pose Graph),
    # 그 그래프를 최적화해서 맵을 만듦.
    # 이 최적화 문제를 푸는 라이브러리가 "솔버"임.
    # ================================================================

    # 사용할 솔버 플러그인 선택
    # CeresSolver: Google이 만든 비선형 최소제곱 최적화 라이브러리
    # slam_toolbox 기본 권장 솔버. 정확도와 속도 균형이 좋음.
    solver_plugin: solver_plugins::CeresSolver

    # 선형 방정식을 푸는 방법 선택
    # SPARSE_NORMAL_CHOLESKY: 희소 행렬(sparse matrix)에 특화된 Cholesky 분해 방식
    # Pose Graph는 대부분의 노드가 서로 연결되지 않아 희소 행렬이 됨 → 이 방식이 효율적
    # (대안: DENSE_QR → 작은 문제엔 안정적이지만 큰 맵에선 느림)
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY

    # 반복 최적화 수렴 속도를 높이는 전처리(preconditioner) 방식
    # SCHUR_JACOBI: Pose Graph 구조에 최적화된 전처리 방식
    # 블록 대각 구조를 활용해 연산량을 줄임
    ceres_preconditioner: SCHUR_JACOBI

    # 최적화 탐색 전략 (신뢰 영역 방법)
    # LEVENBERG_MARQUARDT: Gauss-Newton과 Gradient Descent를 자동으로 조합
    # 수렴이 안 될 것 같으면 더 조심스럽게, 잘 될 것 같으면 빠르게 탐색
    # 가장 범용적이고 안정적인 방법
    ceres_trust_strategy: LEVENBERG_MARQUARDT

    # Dogleg 스텝 계산 방식 (LEVENBERG_MARQUARDT와 함께 사용)
    # TRADITIONAL_DOGLEG: 표준 Dogleg 방식
    # Cauchy 스텝과 Gauss-Newton 스텝을 신뢰 영역 안에서 보간
    ceres_dogleg_type: TRADITIONAL_DOGLEG

    # 이상치(outlier) 처리를 위한 손실 함수
    # None: 손실 함수 없음 → 모든 스캔 매칭 결과를 동일하게 신뢰
    # (대안: HuberLoss → 매칭 오차가 크면 영향력을 줄임, 노이즈 많은 환경에 유리)
    ceres_loss_function: None

    num_threads: 4

    num_for_global: 4

    # ================================================================
    # [2] 토픽 / 프레임 설정
    #
    # slam_toolbox가 구독/발행할 토픽과 좌표계 이름을 지정.
    # 우리 시스템의 실제 토픽/프레임 이름과 반드시 일치해야 함.
    # ================================================================

    # 오도메트리 좌표계 이름
    # ekf_node가 발행하는 odom→base_link TF의 부모 프레임과 일치해야 함
    odom_frame: odom

    # SLAM이 생성하는 지도의 기준 좌표계 이름
    # slam_toolbox가 map→odom TF를 발행할 때 부모 프레임으로 사용
    # /map 토픽 데이터 구조
    # OccupancyGrid
    # ├── header
    # │   ├── stamp        ← 언제 만들어진 맵인지
    # │   └── frame_id     ← "map" (맵 좌표계 기준)
    # ├── info (MapMetaData)
    # │   ├── resolution   ← 0.05 (1셀 = 5cm)
    # │   ├── width        ← 99 (가로 셀 수)
    # │   ├── height       ← 99 (세로 셀 수)
    # │   └── origin       ← 맵 왼쪽 아래 모서리의 실제 좌표
    # └── data             ← 99×99 = 9801개 숫자의 1차원 배열
    map_frame: map

    # 로봇 몸체 좌표계 이름
    # URDF의 base_link와 일치해야 함
    base_frame: base_link

    # LiDAR 스캔 토픽 이름
    # ros_ign_bridge가 브리지하는 /scan 토픽과 일치해야 함
    scan_topic: /scan

    # 동작 모드 선택
    # slam 맵 생성과 위치 추정 두 개에서 모드를 다르게 사용해야 함
    # mapping:      맵을 새로 만드는 모드, mapping 일 경우 map_start_at_dock과 map_file_name을 주석처리
    # localization: 저장된 맵 위에서 위치만 추정하는 모드
    # mode: mapping
    mode: localization
    # mapping일때 밑에 줄 주석처리
    map_start_at_dock: true
    # 저장된 맵 경로 (확장자 없이 입력)
    # slam_toolbox가 .pgm + .yaml 쌍을 자동으로 로드함
    # map_file_name: /home/lyj/amr_ws/maps/amr_map
    # map_file_name: /home/lyj/amr_ws/maps/amr_map_empty
    # map_file_name: /home/lyj/amr_ws/maps/test_map
    # map_file_name: /home/lyj/amr_ws/maps/test_room_dynamic
    map_file_name: /home/lyj/isaac_amr_ws/maps/isaac_warehouse_map

    # ================================================================
    # [3] 일반 동작 설정
    # ================================================================

    # 디버그 로그 출력 여부
    # true로 하면 터미널에 상세 로그가 쏟아짐 → 평소엔 false
    debug_logging: false

    # 스캔 처리 간격 (N번째 스캔마다 처리)
    # 1: 모든 스캔 처리 (기본값)
    # 2: 한 번 건너뛰고 처리 → CPU 부하 줄이지만 맵 품질 저하
    # LiDAR가 10Hz라 부하가 낮으므로 1로 설정
    throttle_scans: 1

    # map→odom TF 발행 주기 [초]
    # 0.02s = 50Hz로 설정했지만 실제로는 /scan 주기(10Hz)에 맞춰 10Hz로 발행됨
    # 너무 낮으면 TF가 끊겨 보여서 rviz에서 떨림 현상 발생
    transform_publish_period: 0.02

    # /map 토픽(OccupancyGrid) 발행 주기 [초]
    # 5.0s = 0.2Hz. 맵은 자주 바뀌지 않으므로 자주 발행할 필요 없음
    # 낮게 설정하면 CPU/네트워크 낭비
    map_update_interval: 5.0

    # 맵 해상도 [m/cell]
    # 0.05 = 5cm 단위로 맵을 격자로 나눔
    # 작을수록 정밀하지만 메모리/연산 증가
    # 실내 5x5m 환경에서 0.05m는 적절한 선택
    resolution: 0.05

    # 연속된 스캔 처리 사이의 최소 시간 간격 [초]
    # 0.5s: 0.5초 미만 간격으로 들어온 스캔은 처리 건너뜀
    # 로봇이 제자리에 서 있을 때 불필요한 처리를 막는 역할
    minimum_time_interval: 0.5

    # TF 조회 타임아웃 [초]
    # slam_toolbox가 TF(예: odom→base_link)를 조회할 때 최대 대기 시간
    # 이 시간 안에 TF가 없으면 해당 스캔 처리를 건너뜀
    # 너무 짧으면 TF 지연으로 스캔을 자주 놓침
    transform_timeout: 0.2

    # TF 버퍼에 보관할 기간 [초]
    # slam_toolbox 내부에서 과거 TF를 참조할 때 사용
    # 30초면 충분히 여유 있는 값
    tf_buffer_duration: 30.0

    # LiDAR 최대 유효 거리 [m]
    # 이 거리 이상의 스캔 포인트는 무시함
    # simple_room이 5x5m이라 대각선 최대 약 7m → 6.0m로 충분히 커버
    # 너무 크게 설정하면 노이즈 포인트까지 사용해서 맵 품질 저하
    max_laser_range: 3.5

    # ================================================================
    # [4] 루프 클로저 설정
    #
    # 루프 클로저(Loop Closure)란?
    # 로봇이 이미 지나간 곳을 다시 방문했을 때
    # "아, 여기 왔던 곳이네!"를 인식하고
    # 지금까지 쌓인 오도메트리 드리프트를 한꺼번에 보정하는 것.
    #
    # 예시:
    #   방을 한 바퀴 돌고 시작점으로 돌아올 때
    #   오도메트리만으로는 시작점과 현재 위치가 약간 어긋남.
    #   루프 클로저가 이 어긋남을 감지하고 전체 경로를 보정함.
    # ================================================================

    # 루프 클로저 coarse 단계의 최소 응답값
    # 0.35 이상이어야 coarse 단계 통과 → fine 단계로 진행
    loop_match_minimum_response_coarse: 0.7  # 0.35 → 0.55
    # 루프 클로저 fine 단계의 최소 응답값
    # 0.45 이상이어야 최종적으로 루프 클로저로 확정
    # coarse보다 높게 설정 → 두 단계를 거쳐 정확도 보장
    loop_match_minimum_response_fine: 0.8    # 0.45 → 0.65
    # 루프 클로저로 인정하기 위한 최소 체인 길이
    # 과거 스캔들이 최소 10개 이상 연속으로 이어져야 루프로 인정
    # 너무 작으면 오탐(false positive) 루프 클로저 발생
    loop_match_minimum_chain_size: 15         # 10 → 15
    # 인접 스캔 간 최대 허용 거리 [m]
    # 1.5m 이상 떨어진 스캔끼리는 연결하지 않음
    # 너무 크면 엉뚱한 스캔이 연결될 수 있음
    link_scan_maximum_distance: 0.8           # 1.5 → 1.0
    # 최소 이동 거리 줄임 → 더 자주 스캔 추가해서 드리프트 방지
    # 새 스캔을 처리하기 위한 최소 이동 거리 [m]
    # 0.2m 이상 이동했을 때만 새 스캔을 맵에 추가
    # 너무 작으면 제자리에서 불필요한 스캔을 계속 추가해서 맵이 지저분해짐
    # 너무 크면 맵 업데이트가 느려짐
    minimum_travel_distance: 0.1  # 0.2 → 0.1

    # rviz에서 slam_toolbox 플러그인으로 수동 개입 가능 여부
    # true: 맵의 특정 노드를 rviz에서 직접 조작 가능 (디버그용)
    # false: 자동으로만 동작 (일반 운용 시)
    enable_interactive_mode: false

    # ================================================================
    # [5] 스캔 매칭 설정
    #
    # 스캔 매칭이란?
    # 현재 LiDAR 스캔과 이전에 저장된 스캔(또는 맵)을 비교해서
    # 로봇이 얼마나 이동했는지 계산하는 것.
    # 오도메트리보다 훨씬 정확하게 위치를 추정할 수 있음.
    # ================================================================

    # 스캔 매칭 사용 여부
    # true: LiDAR 스캔으로 위치 보정 (권장)
    # false: 오도메트리만 사용 → 드리프트 누적
    use_scan_matching: true

    # 스캔의 무게중심(barycenter)을 기준점으로 사용할지 여부
    # true: 스캔 포인트들의 평균 위치를 기준으로 매칭 → 안정적
    # false: 로봇 위치를 기준으로 매칭
    use_scan_barycenter: true

    # 새 스캔을 처리하기 위한 최소 회전 각도 [rad]
    # 0.2rad ≈ 11.5도 이상 회전했을 때만 새 스캔 추가
    # minimum_travel_distance와 OR 조건: 둘 중 하나라도 충족하면 처리
    minimum_travel_heading: 0.2

    # 스캔 버퍼 크기 (최근 N개 스캔을 메모리에 유지)
    # 루프 클로저 후보 탐색에 사용
    # 너무 크면 메모리 사용량 증가
    scan_buffer_size: 10

    # 스캔 버퍼에 보관할 스캔의 최대 거리 [m]
    # 이 거리 이상 떨어진 위치의 스캔은 버퍼에서 제거
    scan_buffer_maximum_scan_distance: 10.0

    # 스캔 매칭 응답값의 최소 임계값 (fine 단계)
    # 응답값: 두 스캔이 얼마나 잘 일치하는지 나타내는 점수 (0~1)
    # 0.1: 매칭 점수가 0.1 이상이어야 유효한 매칭으로 인정
    # 너무 높으면 매칭이 자주 실패, 너무 낮으면 잘못된 매칭 허용
    link_match_minimum_response_fine: 0.1

    # 루프 클로저 후보를 탐색하는 최대 거리 [m]
    # 현재 위치에서 3.0m 이내의 과거 스캔들을 루프 클로저 후보로 검토
    # simple_room 5x5m에서 3.0m면 반대편 벽까지 커버
    loop_search_maximum_distance: 3.0

    # 루프 클로저 활성화 여부
    # true: 루프 클로저 탐지 및 보정 수행
    # false: 루프 클로저 없이 오도메트리 + 스캔 매칭만
    do_loop_closing: true

    # 루프 클로저 coarse 단계의 최대 허용 분산
    # coarse 단계: 대략적인 위치에서 빠르게 후보를 걸러내는 단계
    # 분산이 3.0 이하인 후보만 fine 단계로 넘김
    loop_match_maximum_variance_coarse: 3.0

    # ================================================================
    # [6] 상관 기반 스캔 매칭 파라미터
    #
    # 상관(Correlation) 스캔 매칭이란?
    # 두 스캔을 여러 위치/각도로 겹쳐보면서 가장 잘 일치하는
    # 변환(translation + rotation)을 찾는 방법.
    # 마치 두 사진을 겹쳐서 가장 잘 맞는 위치를 찾는 것과 같음.
    #
    # [일반 스캔 매칭 vs 루프 클로저 스캔 매칭]
    # 일반: 이전 스캔과 현재 스캔 비교 (인접한 위치, 좁은 탐색 범위)
    # 루프: 멀리 떨어진 과거 위치와 비교 (넓은 탐색 범위 필요)
    # ================================================================

    # --- 일반 스캔 매칭용 탐색 공간 ---

    # 탐색 공간의 크기 [m]
    # 현재 예측 위치 ±0.5m 범위 안에서 최적 위치를 탐색
    correlation_search_space_dimension: 0.5

    # 탐색 공간의 해상도 [m]
    # 0.01m(1cm) 간격으로 탐색 → 정밀하지만 연산량 증가
    # dimension/resolution = 탐색 격자 수: 0.5/0.01 = 50칸
    correlation_search_space_resolution: 0.01

    # 스캔 포인트를 얼마나 퍼뜨려서 비교할지 (가우시안 스미어)
    # 0.1m: 포인트 주변 0.1m까지 영향을 줌
    # 크게 설정하면 매칭이 더 관대해져서 노이즈에 강해지지만 정밀도 감소
    correlation_search_space_smear_deviation: 0.1

    # --- 루프 클로저용 탐색 공간 (일반보다 훨씬 넓어야 함) ---

    # 루프 클로저 탐색 공간 크기 [m]
    # ±8.0m 범위에서 과거 위치를 탐색
    # 일반(0.5m)보다 16배 넓음 → 드리프트가 쌓인 상태에서도 찾을 수 있어야 함
    loop_search_space_dimension: 8.0

    # 루프 클로저 탐색 해상도 [m]
    # 0.05m(5cm) 간격 → 일반(0.01m)보다 거칠게 탐색
    # 넓은 공간을 빠르게 탐색하기 위해 해상도를 낮춤
    loop_search_space_resolution: 0.05

    # 루프 클로저 스미어 편차
    # 0.03m: 일반(0.1m)보다 좁게 → 루프 클로저는 더 정밀하게 매칭
    loop_search_space_smear_deviation: 0.03

    # ================================================================
    # [7] 스캔 매처 세부 파라미터
    #
    # 실제 최적 변환을 찾는 과정에서 사용하는 세부 설정.
    # coarse(거친) → fine(정밀) 두 단계로 나눠서 탐색함.
    # coarse: 넓은 범위를 빠르게 훑어 후보를 좁힘
    # fine:   좁은 범위를 정밀하게 탐색해서 최적값 확정
    # ================================================================

    # 거리 오차에 대한 패널티 가중치
    # 예측 위치와 매칭 결과 위치의 거리 차이가 클수록 점수를 낮춤
    # 0.5: 거리 오차 1m당 점수를 0.5 감점
    # 크게 설정하면 큰 위치 변화를 더 강하게 억제
    distance_variance_penalty: 0.5

    # 각도 오차에 대한 패널티 가중치
    # 1.0: 각도 오차 1rad당 점수를 1.0 감점
    # 거리보다 각도 오차에 더 민감하게 설정 (회전 오차가 누적에 더 치명적)
    angle_variance_penalty: 1.0

    # fine 탐색 단계의 각도 탐색 범위 [rad]
    # 0.00349rad ≈ 0.2도
    # fine 단계에서 ±0.2도 범위를 정밀 탐색
    fine_search_angle_offset: 0.00349

    # coarse 탐색 단계의 각도 탐색 범위 [rad]
    # 0.349rad ≈ 20도
    # coarse 단계에서 ±20도 범위를 빠르게 탐색
    coarse_search_angle_offset: 0.349

    # coarse 단계의 각도 탐색 간격 [rad]
    # 0.0349rad ≈ 2도 간격으로 탐색
    # coarse_search_angle_offset / coarse_angle_resolution = 10칸
    coarse_angle_resolution: 0.0349

    # 각도 매칭 점수의 최소 허용 비율
    # 0.9: 최고 점수 대비 90% 이상이어야 유효한 각도 후보로 인정
    # 높게 설정할수록 각도 매칭에 엄격함
    minimum_angle_penalty: 0.9

    # 거리 매칭 점수의 최소 허용 비율
    # 0.5: 최고 점수 대비 50% 이상이어야 유효한 거리 후보
    # 각도보다 거리에 더 관대하게 설정
    minimum_distance_penalty: 0.5

    # 응답 확장(Response Expansion) 사용 여부
    # true: 매칭 점수가 낮을 때 탐색 공간을 자동으로 넓혀서 재탐색
    # 처음 탐색에서 좋은 매칭을 못 찾았을 때 한 번 더 시도하는 것
    # 성공률을 높이지만 연산량 증가
    use_response_expansion: true